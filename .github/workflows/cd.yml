name: cd

on:
  push:
    tags:
      - "v*"

jobs:
  tagged-release:
    name: Tagged Release
    runs-on: windows-2022  # windows-2025 dropped InnoSetup/ISCC
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: "true"
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Install the project
        run: uv sync --locked --group pack
      - name: Build Windows Executable with PyInstaller
        run: uv run python pyinstaller.py
      - name: Create Windows Installer with Inno Setup
        run: |
          iscc setup.iss
          mv dist/Slipstream-Setup.exe .
      - name: Build Portable EXE with PyInstaller
        run: |
          uv run python pyinstaller.py --one-file
          mv dist/Slipstream.exe Slipstream-${{ github.ref_name }}-portable.exe
      - name: Deploy release
        uses: marvinpinto/action-automatic-releases@latest
        with:
          prerelease: false
          repo_token: "${{ secrets.GITHUB_TOKEN }}"
          files: |
            Slipstream-Setup.exe
            Slipstream-*-portable.exe
