name: cd

on:
  push:
    tags:
      - "v*"

jobs:
  tagged-release:
    name: Tagged Release
    runs-on: windows-2022  # windows-2025 dropped InnoSetup/ISCC
    environment:
      name: pypi
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: "true"
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Install the project
        run: uv sync --locked --all-extras --group pack
      - name: Build Windows Executable with PyInstaller
        run: uv run python pyinstaller.py
      - name: Create Windows Installer with Inno Setup
        run: |
          $env:SLIPSTREAM_VERSION = uvx hatch version
          iscc setup.iss
          mv dist/Slipstream-Setup.exe .
      - name: Build Portable EXE with PyInstaller
        run: |
          uv run python pyinstaller.py --one-file
          mv dist/Slipstream.exe Slipstream-${{ github.ref_name }}-portable.exe
      - name: Build project
        run: uv build
      - name: Deploy release
        uses: marvinpinto/action-automatic-releases@latest
        with:
          prerelease: false
          repo_token: "${{ secrets.GITHUB_TOKEN }}"
          files: |
            Slipstream-Setup.exe
            Slipstream-*-portable.exe
      - name: Publish to PyPI
        run: uv publish
